<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>אין חיבור — SUMO Ops</title>
    <link rel="manifest" href="/static/ops/manifest.json">
    <link rel="apple-touch-icon" href="/static/ops/icons/apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            -webkit-tap-highlight-color: transparent;
        }
        .offline-card {
            max-width: 420px;
            width: 100%;
        }
        .icon-wrap {
            width: 96px;
            height: 96px;
            margin: 0 auto 20px;
            border-radius: 24px;
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 32px rgba(233,69,96,0.3);
            position: relative;
        }
        .icon-wrap svg { width: 56px; height: 56px; fill: #fff; }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        p { font-size: 15px; color: #a0a8c0; line-height: 1.5; margin-bottom: 24px; }
        .retry-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 32px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            min-height: 48px;
            font-family: inherit;
        }
        .retry-btn:active { transform: scale(0.97); }
        .status {
            margin-top: 20px;
            font-size: 13px;
            color: #6b7a90;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #e74c3c;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .dot.online { background: #0f9b58; animation: none; }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24"><path d="M23.64 7c-.45-.34-4.93-4-11.64-4-1.5 0-2.89.19-4.15.48L18.18 13.81 23.64 7zM3.41 1.31L2 2.72l2.05 2.05C1.91 5.76.59 6.82.36 7l11.63 14.49.01.01.01-.01 3.91-4.87 3.32 3.32 1.41-1.41L3.41 1.31z"/></svg>
        </div>
        <h1>אין חיבור לאינטרנט</h1>
        <p>נראה שאיבדנו את החיבור לשרת. בודקים מחדש אוטומטית כל כמה שניות, או נסה לרענן ידנית.</p>
        <button class="retry-btn" onclick="retryNow()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            נסה שוב
        </button>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">לא מקוון</span>
        </div>
    </div>

    <script>
        function retryNow() {
            location.href = '/ops/';
        }

        function updateStatus() {
            var dot = document.getElementById('statusDot');
            var txt = document.getElementById('statusText');
            if (navigator.onLine) {
                dot.classList.add('online');
                txt.textContent = 'חיבור חזר — מעביר...';
                setTimeout(retryNow, 600);
            } else {
                dot.classList.remove('online');
                txt.textContent = 'לא מקוון';
            }
        }

        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();

        // Auto-retry every 8 seconds when offline
        setInterval(function() {
            if (navigator.onLine) {
                retryNow();
            } else {
                fetch('/ops/api/ping', { method: 'GET', cache: 'no-store' })
                    .then(function(r) { if (r.ok) retryNow(); })
                    .catch(function() {});
            }
        }, 8000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תשלום נכשל - SUMO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Heebo', sans-serif; background: #ffebee; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: #fff; border-radius: 20px; padding: 40px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
        .icon { font-size: 4rem; color: #f44336; margin-bottom: 16px; }
        h1 { font-size: 1.4rem; margin-bottom: 8px; color: #c62828; }
        p { color: #666; font-size: .9rem; }
        .retry { display: inline-block; margin-top: 20px; background: #f44336; color: #fff; padding: 12px 28px; border-radius: 10px; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">❌</div>
        <h1>התשלום נכשל</h1>
        <p>ניתן לנסות שוב או לפנות למלצר.</p>
        {% if session and session.payment_url %}
        <a href="{{ session.payment_url }}" class="retry">נסה שוב</a>
        {% endif %}
    </div>
</body>
</html>

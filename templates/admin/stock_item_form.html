{% extends "admin/base.html" %}

{% block title %}{{ title }} - Sumo Asian Kitchen{% endblock %}

{% block extra_css %}
<style>
    :root {
        --bg-main: #F7F5F0;
        --bg-card: #FFFFFF;
        --text-primary: #2F2F2F;
        --text-secondary: #6B6B6B;
        --accent-primary: #C96F44;
        --accent-secondary: #6B8F71;
        --border-color: #E5E3DD;
    }
    
    .edit-page {
        background: var(--bg-main);
        min-height: 100vh;
        padding: 1rem;
    }
    
    .edit-header {
        max-width: 800px;
        margin: 0 auto 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
    }
    
    .back-btn {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        text-decoration: none;
        color: var(--text-primary);
        font-size: 1.2rem;
        transition: all 0.2s;
    }
    
    .back-btn:hover {
        background: var(--accent-secondary);
        color: white;
    }
    
    .page-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-primary);
        margin: 0;
    }
    
    .edit-form {
        max-width: 800px;
        margin: 0 auto;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1.5rem;
    }
    
    .form-group {
        margin-bottom: 1.25rem;
    }
    
    .form-label {
        display: block;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
    }
    
    .form-label.required::after {
        content: ' *';
        color: var(--accent-primary);
    }
    
    .form-control {
        width: 100%;
        padding: 0.75rem;
        font-size: 1rem;
        color: var(--text-primary);
        background: var(--bg-main);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        transition: all 0.2s;
    }
    
    .form-control:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(201, 111, 68, 0.1);
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.25rem;
    }
    
    @media (min-width: 640px) {
        .form-row {
            grid-template-columns: 1fr 1fr;
        }
    }
    
    .form-actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-color);
    }
    
    .btn {
        flex: 1;
        padding: 0.85rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        transition: all 0.2s;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }
    
    .btn-primary {
        background: var(--accent-primary);
        color: white;
    }
    
    .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }
    
    .btn-secondary {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
    }
    
    .btn-secondary:hover {
        background: var(--bg-main);
    }
</style>
{% endblock %}

{% block content %}
<div class="edit-page">
    <div class="edit-header">
        <a href="{{ url_for('admin.stock_management', view=request.args.get('view', 'items'), mode=request.args.get('mode', 'card')) }}" class="back-btn">
            <i class="fas fa-arrow-right"></i>
        </a>
        <h1 class="page-title">{{ title }}</h1>
    </div>
    
    <form method="POST" class="edit-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label required">שם בעברית</label>
                <input type="text" name="name_he" class="form-control" value="{{ item.name_he if item else '' }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">שם באנגלית</label>
                <input type="text" name="name_en" class="form-control" value="{{ item.name_en if item else '' }}">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">קטגוריה</label>
                <select name="category_id" class="form-control">
                    <option value="">בחר קטגוריה</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if item and item.category_id == category.id %}selected{% endif %}>
                        {{ category.name_he }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">ספק ראשי</label>
                <select name="supplier_id" class="form-control">
                    <option value="">בחר ספק</option>
                    {% for supplier in suppliers %}
                    <option value="{{ supplier.id }}" {% if item and item.primary_supplier_id == supplier.id %}selected{% endif %}>
                        {{ supplier.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">סוג פריט</label>
                <select name="item_type" class="form-control">
                    <option value="ingredient" {% if not item or item.item_type == 'ingredient' %}selected{% endif %}>מרכיב</option>
                    <option value="packaging" {% if item and item.item_type == 'packaging' %}selected{% endif %}>אריזה</option>
                    <option value="supply" {% if item and item.item_type == 'supply' %}selected{% endif %}>ציוד</option>
                    <option value="finished_product" {% if item and item.item_type == 'finished_product' %}selected{% endif %}>מוצר מוגמר</option>
                    <option value="other" {% if item and item.item_type == 'other' %}selected{% endif %}>אחר</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">יחידת מידה</label>
                <select name="unit" class="form-control">
                    <option value="יחידות" {% if not item or item.unit_he == 'יחידות' %}selected{% endif %}>יחידות</option>
                    <option value="ק״ג" {% if item and item.unit_he == 'ק״ג' %}selected{% endif %}>ק״ג</option>
                    <option value="גרם" {% if item and item.unit_he == 'גרם' %}selected{% endif %}>גרם</option>
                    <option value="ליטר" {% if item and item.unit_he == 'ליטר' %}selected{% endif %}>ליטר</option>
                    <option value="מ״ל" {% if item and item.unit_he == 'מ״ל' %}selected{% endif %}>מ״ל</option>
                    <option value="חבילה" {% if item and item.unit_he == 'חבילה' %}selected{% endif %}>חבילה</option>
                    <option value="קופסה" {% if item and item.unit_he == 'קופסה' %}selected{% endif %}>קופסה</option>
                    <option value="שק" {% if item and item.unit_he == 'שק' %}selected{% endif %}>שק</option>
                    <option value="בקבוק" {% if item and item.unit_he == 'בקבוק' %}selected{% endif %}>בקבוק</option>
                    <option value="צנצנת" {% if item and item.unit_he == 'צנצנת' %}selected{% endif %}>צנצנת</option>
                    <option value="מארז" {% if item and item.unit_he == 'מארז' %}selected{% endif %}>מארז</option>
                    <option value="מנה" {% if item and item.unit_he == 'מנה' %}selected{% endif %}>מנה</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">עלות ליחידה (₪)</label>
                <input type="number" name="cost_per_unit" class="form-control" value="{{ item.cost_per_unit if item else 0 }}" step="0.01" min="0">
            </div>
            
            <div class="form-group">
                <label class="form-label">מלאי מינימלי</label>
                <input type="number" name="minimum_stock" class="form-control" value="{{ item.minimum_stock if item else 0 }}" step="0.01" min="0">
            </div>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('admin.stock_management', view=request.args.get('view', 'items'), mode=request.args.get('mode', 'card')) }}" class="btn btn-secondary">
                <i class="fas fa-times"></i>
                <span>ביטול</span>
            </a>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i>
                <span>{% if item %}שמור שינויים{% else %}הוסף פריט{% endif %}</span>
            </button>
        </div>
    </form>
</div>
{% endblock %}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="40" cy="40" r="35" fill="url(#logoGradient)" opacity="0.1"/>
  
  <!-- Main logo text "סומו" -->
  <text x="100" y="35" font-family="Heebo, Arial, sans-serif" font-size="28" font-weight="900" fill="url(#logoGradient)" text-anchor="middle" direction="rtl">סומו</text>
  
  <!-- Subtitle "מטבח אסייאתי" -->
  <text x="100" y="55" font-family="Assistant, Arial, sans-serif" font-size="12" font-weight="400" fill="#666" text-anchor="middle" direction="rtl">מטבח אסייאתי</text>
  
  <!-- Decorative chopsticks -->
  <line x1="15" y1="25" x2="25" y2="15" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="17" y1="27" x2="27" y2="17" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Decorative Asian-style border elements -->
  <rect x="5" y="65" width="15" height="2" fill="#dc2626" rx="1"/>
  <rect x="25" y="65" width="10" height="2" fill="#1e3a8a" rx="1"/>
  
  <rect x="160" y="65" width="15" height="2" fill="#dc2626" rx="1"/>
  <rect x="180" y="65" width="15" height="2" fill="#1e3a8a" rx="1"/>
</svg>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שגיאה {{ error_code }} - SUMO Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sumo-coral: #C75450;
            --sumo-navy: #1B2951;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, var(--sumo-navy), var(--sumo-coral));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        
        .error-icon {
            font-size: 4rem;
            color: var(--sumo-coral);
            margin-bottom: 20px;
        }
        
        .error-code {
            font-size: 3rem;
            font-weight: 900;
            color: var(--sumo-navy);
            margin-bottom: 10px;
        }
        
        .error-title {
            font-size: 1.5rem;
            color: var(--sumo-navy);
            margin-bottom: 15px;
        }
        
        .error-message {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .error-suggestion {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid var(--sumo-coral);
        }
        
        .btn-home {
            background: var(--sumo-coral);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .btn-home:hover {
            background: #a63c38;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(199,84,80,0.3);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        
        <div class="error-code">{{ error_code }}</div>
        <div class="error-title">{{ error_title }}</div>
        <div class="error-message">{{ error_message }}</div>
        
        {% if suggestion %}
        <div class="error-suggestion">
            <strong>💡 הצעה:</strong><br>
            {{ suggestion | safe }}
        </div>
        {% endif %}
        
        <div class="mt-4">
            <a href="/admin/" class="btn-home">
                <i class="fas fa-home me-2"></i>
                חזור לדף הבית
            </a>
            <a href="/admin/login" class="btn btn-outline-secondary ms-2">
                <i class="fas fa-sign-in-alt me-2"></i>
                התחבר
            </a>
        </div>
    </div>
</body>
</html>

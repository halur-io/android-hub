<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תשלום הצליח - SUMO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Heebo', sans-serif; background: #e8f5e9; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: #fff; border-radius: 20px; padding: 40px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
        .icon { font-size: 4rem; color: #4caf50; margin-bottom: 16px; }
        h1 { font-size: 1.4rem; margin-bottom: 8px; color: #2e7d32; }
        p { color: #666; font-size: .9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>תשלום התקבל בהצלחה!</h1>
        <p>תודה רבה, ניתן לסגור דף זה.</p>
        {% if session %}
        <p style="margin-top:12px; font-size:.8rem; color:#aaa;">שולחן {{ session.table.table_number if session.table else '' }}</p>
        {% endif %}
    </div>
</body>
</html>

{% extends "admin/base.html" %}

{% block title %}{{ 'עריכת כלל אפסל' if rule else 'כלל אפסל חדש' }} - Admin Panel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-chart-line me-2"></i>{{ 'עריכת כלל אפסל' if rule else 'כלל אפסל חדש' }}</h1>
    <a href="{{ url_for('admin.upsell_rules') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-right me-1"></i>חזרה לכללי אפסל
    </a>
</div>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

    <div class="card mb-3">
        <div class="card-header"><i class="fas fa-crosshairs me-2"></i>טריגר (מתי להציג)</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">סוג טריגר</label>
                    <select name="trigger_type" id="trigger-type" class="form-select" onchange="updateTriggerOptions()">
                        <option value="category" {% if rule and rule.trigger_type == 'category' %}selected{% endif %}>קטגוריה</option>
                        <option value="item" {% if rule and rule.trigger_type == 'item' %}selected{% endif %}>פריט ספציפי</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label">בחרו <span id="trigger-label">קטגוריה</span></label>
                    <select name="trigger_id" id="trigger-id" class="form-select">
                        <option value="">-- בחרו --</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header"><i class="fas fa-gift me-2"></i>פריט מוצע</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">פריט להציע *</label>
                    <select name="suggested_item_id" class="form-select" required>
                        <option value="">-- בחרו פריט --</option>
                        {% for item in menu_items %}
                        <option value="{{ item.id }}" {% if rule and rule.suggested_item_id == item.id %}selected{% endif %}>{{ item.name_he }} (₪{{ item.base_price | int }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">מחיר מיוחד (₪)</label>
                    <input type="number" step="0.5" min="0" name="discounted_price" class="form-control" value="{{ rule.discounted_price if rule and rule.discounted_price else '' }}" placeholder="השאירו ריק למחיר רגיל">
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header"><i class="fas fa-comment me-2"></i>הודעה ללקוח</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">הודעה בעברית</label>
                    <input type="text" name="message_he" class="form-control" value="{{ rule.message_he if rule else '' }}" placeholder="הוסף שתייה ב-₪5?">
                </div>
                <div class="col-md-6">
                    <label class="form-label">הודעה באנגלית</label>
                    <input type="text" name="message_en" class="form-control" value="{{ rule.message_en if rule else '' }}" placeholder="Add a drink for ₪5?">
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">סדר תצוגה</label>
                    <input type="number" name="display_order" class="form-control" value="{{ rule.display_order if rule else 0 }}">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is-active" {% if not rule or rule.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is-active">פעיל</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mb-4">
        <button type="submit" class="btn btn-primary btn-lg px-5">
            <i class="fas fa-save me-2"></i>{{ 'עדכון' if rule else 'צור כלל' }}
        </button>
    </div>
</form>

<script>
var categories = [
    {% for cat in categories %}
    {id: {{ cat.id }}, name: "{{ cat.name_he | e }}"},
    {% endfor %}
];
var menuItems = [
    {% for item in menu_items %}
    {id: {{ item.id }}, name: "{{ item.name_he | e }}", price: {{ item.base_price | int }}},
    {% endfor %}
];
var currentTriggerId = {{ rule.trigger_id if rule else 0 }};

function updateTriggerOptions() {
    var type = document.getElementById('trigger-type').value;
    var sel = document.getElementById('trigger-id');
    var label = document.getElementById('trigger-label');
    sel.innerHTML = '<option value="">-- בחרו --</option>';
    if (type === 'category') {
        label.textContent = 'קטגוריה';
        categories.forEach(function(c) {
            var opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.name;
            if (c.id === currentTriggerId) opt.selected = true;
            sel.appendChild(opt);
        });
    } else {
        label.textContent = 'פריט';
        menuItems.forEach(function(m) {
            var opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.name + ' (₪' + m.price + ')';
            if (m.id === currentTriggerId) opt.selected = true;
            sel.appendChild(opt);
        });
    }
}
updateTriggerOptions();
</script>
{% endblock %}

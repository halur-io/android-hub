{% extends "ops/base.html" %}
{% block header_title %}יום פעילות{% endblock %}
{% block title %}יום פעילות - לוח בקרה{% endblock %}

{% block content %}
<div style="margin-bottom: 16px;">
    <div style="font-size:16px;font-weight:700;margin-bottom:12px;"><i class="fas fa-calendar-day" style="color:var(--ops-accent);"></i> יום פעילות</div>
    <div class="ops-card" id="opDayCard" style="padding:14px 16px;">
        <div id="opDayBody" style="display:flex;flex-direction:column;gap:6px;">
            <div style="color:#888;">טוען…</div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
            <button id="opDayCloseBtn" class="ops-btn ops-btn-sm" style="background:#dc2626;color:#fff;border:none;font-weight:700;padding:10px 14px;border-radius:8px;display:none;">
                <i class="fas fa-lock"></i> סגור יום ופתח חדש
            </button>
            <button id="opDayOpenBtn" class="ops-btn ops-btn-sm" style="background:#16a34a;color:#fff;border:none;font-weight:700;padding:10px 14px;border-radius:8px;display:none;">
                <i class="fas fa-play"></i> פתח יום עכשיו
            </button>
        </div>
    </div>
</div>

<div id="closeDayModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;align-items:center;justify-content:center;padding:16px;">
    <div style="background:#1a1a2e;color:#fff;border-radius:14px;padding:18px;max-width:360px;width:100%;direction:rtl;">
        <div style="font-size:18px;font-weight:800;margin-bottom:6px;">סגירת יום פעילות</div>
        <div id="closeDaySummary" style="background:#0f0f1f;border-radius:8px;padding:10px;font-size:13px;margin:8px 0;line-height:1.7;"></div>
        <div style="font-size:13px;color:#bbb;margin-bottom:6px;">הזן את קוד ה-PIN שלך לאישור:</div>
        <input id="closeDayPin" type="password" inputmode="numeric" maxlength="8" autocomplete="off" style="width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#0f0f1f;color:#fff;font-size:18px;text-align:center;letter-spacing:6px;" />
        <div id="closeDayError" style="color:#ef4444;font-size:13px;min-height:18px;margin-top:6px;"></div>
        <div style="display:flex;gap:8px;margin-top:10px;">
            <button id="closeDayCancel" class="ops-btn ops-btn-sm" style="flex:1;background:#333;color:#fff;border:none;padding:10px;border-radius:8px;">ביטול</button>
            <button id="closeDayConfirm" class="ops-btn ops-btn-sm" style="flex:2;background:#dc2626;color:#fff;border:none;font-weight:700;padding:10px;border-radius:8px;">סגור יום</button>
        </div>
    </div>
</div>

<script>
(function(){
    function fmtDate(iso){
        if(!iso) return '';
        try { var d = new Date(iso); return d.toLocaleString('he-IL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}); } catch(e){ return iso; }
    }
    function loadDay(){
        fetch('/ops/api/operating-day/status').then(r=>r.json()).then(function(j){
            var body = document.getElementById('opDayBody');
            var btnClose = document.getElementById('opDayCloseBtn');
            var btnOpen = document.getElementById('opDayOpenBtn');
            if(!j || !j.open){
                body.innerHTML = '<div style="color:#888;">אין יום פעיל. ניתן לפתוח יום עכשיו או שייפתח אוטומטית עם ההזמנה הבאה.</div>';
                btnClose.style.display = 'none';
                btnOpen.style.display = 'inline-flex';
                return;
            }
            body.innerHTML =
                '<div><b>נפתח:</b> ' + fmtDate(j.opened_at) + (j.opened_by ? ' ע״י ' + j.opened_by : '') + '</div>' +
                '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;text-align:center;">' +
                  '<div style="background:#0f0f1f;border-radius:6px;padding:6px;"><div style="font-size:11px;color:#888;">איסוף (T)</div><div style="font-size:18px;font-weight:800;">' + (j.pickup||0) + '</div></div>' +
                  '<div style="background:#0f0f1f;border-radius:6px;padding:6px;"><div style="font-size:11px;color:#888;">משלוח (D)</div><div style="font-size:18px;font-weight:800;">' + (j.delivery||0) + '</div></div>' +
                  '<div style="background:#0f0f1f;border-radius:6px;padding:6px;"><div style="font-size:11px;color:#888;">ישיבה (TB)</div><div style="font-size:18px;font-weight:800;">' + (j.dine_in||0) + '</div></div>' +
                '</div>' +
                '<div style="margin-top:8px;display:flex;justify-content:space-between;font-weight:700;"><span>סה״כ הכנסות</span><span>₪' + (j.revenue||0).toFixed(0) + '</span></div>' +
                '<div style="display:flex;justify-content:space-between;color:#888;font-size:13px;"><span>מזומן</span><span>₪' + (j.cash||0).toFixed(0) + '</span></div>';
            btnClose.style.display = 'inline-flex';
            btnOpen.style.display = 'none';
            btnClose.dataset.summary = JSON.stringify(j);
        }).catch(function(){
            document.getElementById('opDayBody').innerHTML = '<div style="color:#ef4444;">שגיאה בטעינה</div>';
        });
    }
    function openModal(){
        var raw = document.getElementById('opDayCloseBtn').dataset.summary || '{}';
        var j = {}; try { j = JSON.parse(raw); } catch(e){}
        document.getElementById('closeDaySummary').innerHTML =
            'איסוף: <b>' + (j.pickup||0) + '</b> · משלוח: <b>' + (j.delivery||0) + '</b> · ישיבה: <b>' + (j.dine_in||0) + '</b><br>' +
            'סה״כ הכנסות: <b>₪' + (j.revenue||0).toFixed(0) + '</b> · מזומן: <b>₪' + (j.cash||0).toFixed(0) + '</b>';
        document.getElementById('closeDayPin').value = '';
        document.getElementById('closeDayError').textContent = '';
        document.getElementById('closeDayModal').style.display = 'flex';
        setTimeout(function(){ document.getElementById('closeDayPin').focus(); }, 80);
    }
    function closeModal(){ document.getElementById('closeDayModal').style.display = 'none'; }
    function confirmClose(){
        var pin = (document.getElementById('closeDayPin').value || '').trim();
        var err = document.getElementById('closeDayError');
        err.textContent = '';
        if(!pin){ err.textContent = 'נא להזין PIN'; return; }
        var btn = document.getElementById('closeDayConfirm');
        btn.disabled = true; btn.textContent = 'סוגר…';
        fetch('/ops/api/operating-day/close',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})})
            .then(r=>r.json()).then(function(j){
                btn.disabled = false; btn.textContent = 'סגור יום';
                if(!j.ok){ err.textContent = j.error || 'שגיאה'; return; }
                closeModal();
                loadDay();
                if(window.alert) alert('היום נסגר. סה״כ הזמנות: ' + (j.closed.orders_total||0) + ' · הכנסות: ₪' + (j.closed.revenue||0).toFixed(0));
            }).catch(function(){
                btn.disabled = false; btn.textContent = 'סגור יום';
                err.textContent = 'שגיאת רשת';
            });
    }
    function openNewDay(){
        fetch('/ops/api/operating-day/open',{method:'POST'}).then(r=>r.json()).then(function(j){
            if(j.ok){ loadDay(); }
            else if(window.alert){ alert(j.error || 'שגיאה'); }
        });
    }
    document.addEventListener('DOMContentLoaded', function(){
        loadDay();
        document.getElementById('opDayCloseBtn').addEventListener('click', openModal);
        document.getElementById('opDayOpenBtn').addEventListener('click', openNewDay);
        document.getElementById('closeDayCancel').addEventListener('click', closeModal);
        document.getElementById('closeDayConfirm').addEventListener('click', confirmClose);
    });
})();
</script>
{% endblock %}

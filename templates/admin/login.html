<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה למערכת - SUMO Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sumo-coral: #C75450;
            --sumo-navy: #1B2951;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, var(--sumo-navy), var(--sumo-coral));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        .login-card h2 {
            color: var(--sumo-navy);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
        
        .btn-login {
            background: var(--sumo-coral);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            background: #a63c38;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(199,84,80,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: var(--sumo-coral);
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>SUMO</h1>
            <p class="text-muted">ניהול מערכת</p>
            <small class="text-muted d-block mt-2">הכנס פרטי התחברות לגישה למערכת הניהול</small>
        </div>
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="mb-3">
                <label for="username" class="form-label">שם משתמש</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label">סיסמה</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-login">כניסה למערכת</button>
        </form>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{% if category == 'error' %}danger{% elif category == 'success' %}success{% elif category == 'info' %}info{% else %}warning{% endif %} mt-3" role="alert">
                        <i class="fas fa-{% if category == 'error' %}exclamation-triangle{% elif category == 'success' %}check-circle{% elif category == 'info' %}info-circle{% else %}exclamation-circle{% endif %} me-2"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="mt-4 text-center">
            <small class="text-muted">
                Admin Panel URL: <code>/admin/</code><br>
                Default credentials: admin / admin123
            </small>
        </div>
    </div>
</body>
</html>

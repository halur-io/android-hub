<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>כניסה — לוח הזמנות</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Heebo',sans-serif;
      background: linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:20px;
    }
    .login-card {
      background:#1e293b; border-radius:24px;
      box-shadow:0 25px 60px rgba(0,0,0,0.5);
      width:100%; max-width:420px; overflow:hidden;
    }
    .login-header {
      background:linear-gradient(135deg,#4f46e5,#6366f1);
      padding:32px 28px 24px; text-align:center; color:#fff;
    }
    .login-icon {
      width:72px; height:72px; border-radius:20px;
      background:rgba(255,255,255,0.15);
      display:inline-flex; align-items:center; justify-content:center;
      font-size:2rem; margin-bottom:14px;
    }
    .login-header h1 { font-size:1.5rem; font-weight:800; margin-bottom:4px; }
    .login-header p { opacity:.8; font-size:.9rem; }
    .login-body { padding:28px; }
    .staff-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
    .staff-btn {
      background:#0f172a; border:2px solid #334155; border-radius:14px;
      color:#94a3b8; padding:14px 10px; text-align:center; cursor:pointer;
      transition:all .2s; font-family:'Heebo',sans-serif; font-size:.88rem; font-weight:600;
    }
    .staff-btn:hover, .staff-btn.active {
      border-color:#6366f1; color:#fff; background:#1e1b4b;
    }
    .staff-btn i { display:block; font-size:1.4rem; margin-bottom:6px; color:#6366f1; }
    .pin-input {
      display:flex; gap:10px; justify-content:center; margin:20px 0;
    }
    .pin-digit {
      width:54px; height:64px; border-radius:14px;
      border:2px solid #334155; background:#0f172a; color:#fff;
      text-align:center; font-size:1.6rem; font-weight:700;
      outline:none; caret-color:#6366f1;
      transition:border-color .2s;
    }
    .pin-digit:focus { border-color:#6366f1; }
    .btn-login {
      width:100%; padding:14px; border-radius:14px;
      background:linear-gradient(135deg,#4f46e5,#6366f1);
      border:none; color:#fff; font-size:1rem; font-weight:700;
      font-family:'Heebo',sans-serif; cursor:pointer; transition:opacity .2s;
    }
    .btn-login:hover { opacity:.9; }
    .btn-login:disabled { opacity:.5; cursor:not-allowed; }
    .error-msg {
      background:#450a0a; border:1px solid #ef4444; color:#fca5a5;
      border-radius:10px; padding:10px 14px; font-size:.88rem; margin-top:14px;
      display:none;
    }
    .divider { height:1px; background:#334155; margin:18px 0; }
    .single-staff-note { color:#64748b; font-size:.85rem; text-align:center; margin-bottom:16px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="login-icon"><i class="fas fa-shopping-bag"></i></div>
    <h1>לוח הזמנות</h1>
    <p>מרכז שליטה — הזמנות ומשלוחים</p>
  </div>
  <div class="login-body">

    {% if staff_members %}
    <p class="single-staff-note">בחרו שם ולאחר מכן הזינו קוד PIN</p>
    <div class="staff-grid" id="staff-grid">
      {% for staff in staff_members %}
      <button type="button" class="staff-btn" data-id="{{ staff.id }}" onclick="selectStaff(this,'{{ staff.id }}')">
        <i class="fas fa-user-circle"></i>{{ staff.name }}
      </button>
      {% endfor %}
    </div>
    <div class="divider"></div>
    {% endif %}

    <div class="pin-input" id="pin-area">
      <input class="pin-digit" maxlength="1" type="password" inputmode="numeric" pattern="[0-9]*" id="p0" oninput="moveNext(this,1)" onkeydown="handleBack(event,this,-1)">
      <input class="pin-digit" maxlength="1" type="password" inputmode="numeric" pattern="[0-9]*" id="p1" oninput="moveNext(this,2)" onkeydown="handleBack(event,this,0)">
      <input class="pin-digit" maxlength="1" type="password" inputmode="numeric" pattern="[0-9]*" id="p2" oninput="moveNext(this,3)" onkeydown="handleBack(event,this,1)">
      <input class="pin-digit" maxlength="1" type="password" inputmode="numeric" pattern="[0-9]*" id="p3" oninput="submitIfFull()" onkeydown="handleBack(event,this,2)">
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()" disabled>
      <i class="fas fa-sign-in-alt me-2"></i>כניסה
    </button>

    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<script>
let selectedStaffId = '{{ staff_members[0].id if staff_members else "" }}';

{% if staff_members|length == 1 %}
document.querySelector('.staff-btn').classList.add('active');
{% endif %}

function selectStaff(el, id) {
  document.querySelectorAll('.staff-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedStaffId = id;
  document.getElementById('p0').focus();
}

function moveNext(el, nextIdx) {
  if (el.value.length === 1) {
    const next = document.getElementById('p' + nextIdx);
    if (next) next.focus();
  }
  checkReady();
}

function handleBack(e, el, prevIdx) {
  if (e.key === 'Backspace' && el.value === '') {
    const prev = document.getElementById('p' + prevIdx);
    if (prev) { prev.value = ''; prev.focus(); }
  }
  checkReady();
}

function submitIfFull() {
  checkReady();
  const pin = getPin();
  if (pin.length === 4) setTimeout(doLogin, 120);
}

function checkReady() {
  const pin = getPin();
  document.getElementById('login-btn').disabled = (pin.length < 4);
}

function getPin() {
  return ['p0','p1','p2','p3'].map(id => document.getElementById(id).value).join('');
}

function clearPin() {
  ['p0','p1','p2','p3'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p0').focus();
  checkReady();
}

function doLogin() {
  const pin = getPin();
  if (pin.length < 4) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>בודק...';

  const fd = new FormData();
  fd.append('pin_id', selectedStaffId);
  fd.append('pin', pin);

  fetch('{{ url_for("order_dashboard.authenticate") }}', { method:'POST', body:fd })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        window.location.href = data.redirect;
      } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-msg').textContent = data.message || 'שגיאה';
        clearPin();
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>כניסה';
      }
    });
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('p0').focus();
</script>
</body>
</html>

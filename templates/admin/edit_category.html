{% extends "admin/base.html" %}

{% block title %}{{ 'עריכת קטגוריה' if category.id else 'הוספת קטגוריה חדשה' }} - Admin Panel{% endblock %}

{% block content %}
<h1 class="mb-4">{{ 'עריכת קטגוריה' if category.id else 'הוספת קטגוריה חדשה' }}</h1>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    
    <div class="card">
        <div class="card-header">
            <i class="fas fa-utensils me-2"></i> פרטי קטגוריה
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <h5>עברית</h5>
                    <div class="mb-3">
                        <label class="form-label">שם הקטגוריה</label>
                        <input type="text" class="form-control" name="name_he" value="{{ category.name_he or '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">תיאור</label>
                        <textarea class="form-control" name="description_he" rows="3">{{ category.description_he or '' }}</textarea>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <h5>English</h5>
                    <div class="mb-3">
                        <label class="form-label">Category Name</label>
                        <input type="text" class="form-control" name="name_en" value="{{ category.name_en or '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description_en" rows="3">{{ category.description_en or '' }}</textarea>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">סדר תצוגה</label>
                        <input type="number" class="form-control" name="display_order" value="{{ category.display_order or 0 }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-check mt-4">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if category.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">
                            קטגוריה פעילה
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="mt-4">
        <button type="submit" class="btn btn-primary btn-lg">
            <i class="fas fa-save me-2"></i> שמור קטגוריה
        </button>
        <a href="{{ url_for('admin.menu') }}" class="btn btn-secondary btn-lg">
            <i class="fas fa-times me-2"></i> ביטול
        </a>
    </div>
</form>

{% endblock %}
